name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            crystal: latest
            arch_label: x86_64
          - os: ubuntu-latest
            crystal: "1.21.0"
            arch_label: x86_64
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.arch_label }}, crystal ${{ matrix.crystal }})
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}

      - name: Create output dir
        run: mkdir -p bin

      - name: Check formatting
        run: crystal tool format --check

      - name: Unit specs (library heap under Boehm)
        run: crystal spec --error-trace

      - name: Sample hello (-Dgc_none)
        run: |
          crystal build -Dgc_none samples/hello.cr -o bin/hello
          ./bin/hello

      - name: Sample min (-Dgc_none)
        run: |
          crystal build -Dgc_none samples/min.cr -o bin/min
          ./bin/min

      - name: Sample alloc (-Dgc_none)
        run: |
          crystal build -Dgc_none samples/alloc.cr -o bin/alloc
          ./bin/alloc 500

      - name: Sample stress (-Dgc_none)
        run: |
          crystal build -Dgc_none samples/stress.cr -o bin/stress
          ./bin/stress 300

      - name: Env knobs smoke (GCRY_DISABLE_AUTO)
        run: |
          crystal build -Dgc_none samples/hello.cr -o bin/hello_noauto
          GCRY_DISABLE_AUTO=1 ./bin/hello_noauto

      - name: Bench churn (library heap)
        run: |
          crystal build bench/churn.cr -o bin/churn
          ./bin/churn 500

  # Optional aarch64 via QEMU user emulation when runners allow it.
  # Kept as a separate job so x86_64 stays green if qemu setup drifts.
  test-aarch64:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU and Crystal deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Cross-build hello for aarch64
        run: |
          mkdir -p bin
          crystal build -Dgc_none --cross-compile --target aarch64-linux-gnu samples/hello.cr -o bin/hello_aarch64
        continue-on-error: true
